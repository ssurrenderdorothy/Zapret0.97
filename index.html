<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>An envelope for Alena</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="instruction" id="instruction">Тыкай балда</div>

  <div class="envelope-wrapper" onclick="openEnvelope()">
    <div class="envelope" id="envelope">
      <div class="flap"></div>
      <div class="left-flap"></div>
      <div class="right-flap"></div>
      <div class="body"></div>
    </div>
  </div>

  <div class="message" id="message">Алена Вечор_ - Симпатишная такая и смешная оч такая прям вся бебебебебеббебебебебебебе</div>

  <audio id="princeMusic" src="temny_prinz.mp3" loop preload="auto"></audio>

  <script>
    let musicStarted = false;
    
    function startMusic() {
      if (musicStarted) return;
      const music = document.getElementById('princeMusic');
      
      music.play().then(() => {
        musicStarted = true;
        console.log('🎵 Музыка играет!');
      }).catch((error) => {
        console.log('⚠️ Ошибка:', error.name);
      });
    }

    // ЕДИНСТВЕННАЯ функция openEnvelope
    window.openEnvelope = function() {
      // Запускаем музыку
      startMusic();
      
      // Открываем конверт
      document.getElementById("envelope").classList.add("open");
      document.getElementById("instruction").classList.add("hide");
      
      // Показываем сообщение через 1.5 секунды
      setTimeout(() => {
        document.getElementById("message").classList.add("show");
      }, 1500);
    };

    // Запасной вариант: клик в любом месте включает музыку
    window.addEventListener('click', startMusic);

    // Сердечки
    function createHeart() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.style.left = Math.random() * 100 + "vw";
      heart.innerHTML = '<svg viewBox="0 0 24 24" fill="red" xmlns="http://www.w3.org/2000/svg"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 6.42 3.42 5 5.5 5c1.54 0 2.99 1.04 3.5 2.44C9.51 6.04 10.96 5 12.5 5 14.58 5 16 6.42 16 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>';
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 20000);
    }

   setInterval(createHeart, 800);
  </script>
</body>
</html>
